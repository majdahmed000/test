name: Approval with Yes/No

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: "Do you want to proceed? (yes/no)"
        required: true
        default: "no"

jobs:
  decision:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check user input
        id: check
        run: |
          if [ "${{ github.event.inputs.proceed }}" = "yes" ]; then
            echo "approved=true" >> $GITHUB_OUTPUT
            echo "User selected YES"
          else
            echo "approved=false" >> $GITHUB_OUTPUT
            echo "User selected NO"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: decision
    if: needs.decision.outputs.approved == 'true'
    steps:
      - name: Deploy step
        run: echo "Deployment running after YES"

  stop:
    runs-on: ubuntu-latest
    needs: decision
    if: needs.decision.outputs.approved == 'false'
    steps:
      - name: Stop pipeline
        run: echo "Pipeline stopped because user selected NO"
