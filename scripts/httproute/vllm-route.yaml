#!/bin/bash

# =========================
# Variables (edit here)
# =========================
NAMESPACE="litellm"
DOMAIN="litellm.llm-k8s.awssolutionsprovider.com"
SERVICE_NAME="litellm"
SERVICE_PORT=4000
PARENT_NAME="traefik"
PARENT_NAMESPACE="traefik"
ROUTE_NAME="litellm-route"

# =========================
# Apply HTTPRoute
# =========================
cat <<EOF | kubectl apply -f -
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${ROUTE_NAME}
  namespace: ${NAMESPACE}

spec:
  parentRefs:
    - name: ${PARENT_NAME}
      namespace: ${PARENT_NAMESPACE}

  hostnames:
    - ${DOMAIN}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ${SERVICE_NAME}
          port: ${SERVICE_PORT}
EOF

echo "LiteLLM HTTPRoute applied successfully"
kubectl get HTTPRoute -n ${NAMESPACE}