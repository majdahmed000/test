apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd

spec:
  project: default

  sources:
    # Helm chart source
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: grafana
      targetRevision: 10.5.8
      helm:
        releaseName: grafana
        valueFiles:
          - $values/Argocd-apps/apps/app5-grafana/valuesgrafana.yaml

    # Git repo source (your repo)
    - repoURL: https://github.com/Tahira-Nawaz/llm-k8s-project.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true