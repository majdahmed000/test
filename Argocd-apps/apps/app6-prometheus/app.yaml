apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd

spec:
  project: default

  sources:
    # 1. Helm chart source
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 25.22.0
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/Argocd-apps/apps/app6-prometheus/values.yaml

    # 2. Your Git repo for values
    - repoURL: https://github.com/Tahira-Nawaz/llm-k8s-project.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true