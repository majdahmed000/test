cat <<EOF | kubectl apply -f -
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parent-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'https://github.com/Tahira-Nawaz/llm-k8s-project.git'
    targetRevision: main
    path: Argocd-apps/apps
    directory:
      recurse: true

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
EOF